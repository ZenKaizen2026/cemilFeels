<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemil Feels - Detail Keranjang</title>
    
    <!-- Memuat Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat Ikon dari Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Memuat Font Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Konfigurasi Tema Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa',
                            300: '#fdba74', 400: '#fb923c', 500: '#f97316',
                            600: '#ea580c', 700: '#c2410c',
                        },
                        // Warna hijau khusus untuk tombol WhatsApp
                        wa: {
                            500: '#25D366', 600: '#128C7E'
                        }
                    },
                    boxShadow: {
                        'glass': '0 10px 40px -10px rgba(0,0,0,0.08)',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-white/95 backdrop-blur-2xl border border-white/60 shadow-glass;
            }
        }

        /* Gradient Background Artistik (Sama seperti sebelumnya) */
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(28,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(28,100%,74%,0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* Opsional: Tambahkan sedikit overlay gelap jika ingin meniru gambar mockup yang backgroundnya gelap */
        .bg-overlay {
            @apply fixed inset-0 bg-slate-900/60 z-0 pointer-events-none;
        }
    </style>
</head>
<body class="text-slate-700 flex items-center justify-center min-h-screen p-4 sm:p-8 antialiased selection:bg-brand-200 selection:text-brand-800 relative">

    <!-- Opsional: Background Overlay Gelap (Bisa dihapus jika ingin background terang seperti page menu) -->
    <!-- <div class="bg-overlay"></div> -->

    <!-- Main Card Container -->
    <main class="glass-panel w-full max-w-[420px] rounded-[2.5rem] p-6 sm:p-8 relative z-10 flex flex-col gap-6">
        
        <!-- Header -->
        <header class="text-center mt-2 mb-2">
            <h1 class="font-display text-2xl sm:text-3xl font-extrabold tracking-tight text-slate-900 mb-1">
                Detail Keranjang
            </h1>
            <p class="font-medium text-brand-500 text-sm sm:text-base">
                Tinjau kembali pesanan Anda ✨
            </p>
        </header>

        <!-- Box Info Pengiriman -->
        <div class="bg-slate-50 border border-slate-100 rounded-2xl p-5">
            <h2 class="font-display font-bold text-slate-900 mb-4 flex items-center gap-2">
                <i data-lucide="circle-user" class="w-5 h-5 text-slate-700"></i> Info Pengiriman
            </h2>
            
            <div class="flex flex-col gap-3 text-sm">
                <!-- Baris Nama -->
                <div class="flex justify-between items-center gap-4">
                    <span class="text-slate-500">Nama:</span>
                    <span class="font-bold text-slate-800 text-right">ds</span>
                </div>
                <!-- Baris Metode -->
                <div class="flex justify-between items-center gap-4">
                    <span class="text-slate-500">Metode:</span>
                    <span class="font-bold text-slate-800 text-right">Ambil Sendiri (Pickup)</span>
                </div>
                <!-- Baris Mood -->
                <div class="flex justify-between items-center gap-4">
                    <span class="text-slate-500">Mood Hari Ini:</span>
                    <span class="font-bold text-slate-800 text-right">Happy / Lapar 🍔</span>
                </div>
            </div>
        </div>

        <!-- Rincian Item (Tabel) -->
        <div class="flex flex-col gap-4 mt-2">
            <!-- Header Kolom -->
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Item</span>
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Harga</span>
            </div>

            <!-- List Item 1 -->
            <div class="flex justify-between items-center gap-4">
                <span class="font-bold text-slate-800 text-sm leading-tight flex-1">Roti Bakar Double Chocolate</span>
                <span class="font-bold text-slate-700 whitespace-nowrap">Rp 20.000</span>
            </div>

            <!-- List Item 2 -->
            <div class="flex justify-between items-center gap-4">
                <span class="font-bold text-slate-800 text-sm leading-tight flex-1">Es Teh JUMBO</span>
                <span class="font-bold text-slate-700 whitespace-nowrap">Rp 5.000</span>
            </div>
        </div>

        <!-- Box Subtotal & Total -->
        <div class="bg-brand-50/70 border border-brand-100 rounded-2xl p-5 mt-2 flex flex-col gap-3">
            <!-- Subtotal Menu -->
            <div class="flex justify-between items-center">
                <span class="text-sm font-medium text-slate-500">Subtotal Menu</span>
                <span class="text-sm font-bold text-slate-800">Rp 25.000</span>
            </div>
            
            <!-- Ongkos Kirim -->
            <div class="flex justify-between items-center">
                <span class="text-sm font-medium text-slate-500">Ongkos Kirim</span>
                <span class="text-sm font-bold text-slate-800">Rp 0</span>
            </div>

            <!-- Garis Pemisah (Opsional, di mockup tidak ada, tapi sering membantu visual) -->
            <!-- <div class="h-px bg-brand-200/50 my-1"></div> -->

            <!-- Total Bayar -->
            <div class="flex justify-between items-center mt-2">
                <span class="text-lg font-display font-extrabold text-slate-900">Total Bayar</span>
                <span class="text-xl font-extrabold text-brand-500">Rp 25.000</span>
            </div>
        </div>

        <!-- Tombol Aksi -->
        <div class="flex flex-col gap-3 mt-2 mb-2">
            <!-- Tombol WA -->
            <button class="w-full bg-wa-500 hover:bg-wa-600 text-white py-4 px-6 rounded-2xl font-bold tracking-wide transition-all duration-300 shadow-lg shadow-wa-500/30 flex items-center justify-center gap-2 focus:outline-none focus:ring-4 focus:ring-wa-500/20 active:scale-95" onclick="alert('Pesanan diteruskan ke WhatsApp!')">
                <i data-lucide="message-circle" class="w-5 h-5"></i> Kirim Pesanan ke WA
            </button>
            
            <!-- Tombol Ubah Pilihan Menu -->
            <button class="w-full py-3 text-slate-500 text-sm font-semibold hover:text-slate-800 transition-colors flex items-center justify-center gap-2 focus:outline-none rounded-xl" onclick="alert('Kembali ke menu...')">
                <i data-lucide="file-edit" class="w-4 h-4"></i> Ubah Pilihan Menu
            </button>
        </div>

    </main>

    <!-- Script Logika Interaksi -->
    <script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();
    </script>
</body>
</html>
