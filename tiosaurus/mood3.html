<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemil Feels - Ekspresikan Perasaanmu</title>
    
    <!-- Memuat Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat Ikon dari Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Memuat Font Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Konfigurasi Tema Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                        }
                    },
                    boxShadow: {
                        'soft': '0 20px 40px -15px rgba(0,0,0,0.05)',
                        'glow': '0 0 20px rgba(249, 115, 22, 0.15)',
                    }
                }
            }
        }
    </script>

    <!-- Kustom CSS untuk Animasi & Transisi -->
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-white/80 backdrop-blur-xl border border-white/40 shadow-soft;
            }
        }

        /* Animasi masuk untuk Form Alamat */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); height: 0; }
            to { opacity: 1; transform: translateY(0); height: auto; }
        }

        #addressContainer {
            display: none;
        }
        
        #addressContainer.show {
            display: block;
            animation: slideDown 0.3s ease-out forwards;
        }

        /* Style untuk Order Card aktif */
        .order-card {
            @apply border-2 border-slate-100 bg-white transition-all duration-300 ease-out;
        }
        .order-card:hover {
            @apply border-brand-200 bg-brand-50/30;
        }
        .order-card.active {
            @apply border-brand-500 bg-brand-50/50 shadow-glow scale-[1.02];
        }
        .order-card.active .card-icon {
            @apply text-brand-500 bg-brand-100;
        }
        .order-card.active h3 {
            @apply text-brand-600;
        }

        /* Style Modal Pop-up */
        .modal-overlay {
            @apply opacity-0 pointer-events-none backdrop-blur-sm bg-slate-900/40;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.show {
            @apply opacity-100 pointer-events-auto;
        }
        
        .modal-content {
            @apply translate-y-8 scale-95 opacity-0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.show .modal-content {
            @apply translate-y-0 scale-100 opacity-100;
        }

        /* Gradient Background Artistik */
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(28,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(28,100%,74%,0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
    </style>
</head>
<body class="text-slate-700 flex justify-center min-h-screen p-4 sm:p-8 antialiased selection:bg-brand-200 selection:text-brand-800">

    <main class="w-full max-w-3xl flex flex-col gap-6 relative z-10 my-auto">
        
        <!-- Header -->
        <header class="text-center mb-4">
            <div class="inline-flex items-center justify-center gap-3 bg-white px-6 py-3 rounded-full shadow-sm border border-slate-100 mb-6">
                <img src="../img/CEMILAJA.png" alt="CemilFeels Logo" class="w-10 h-10 object-contain">
                <span class="font-display font-bold text-xl tracking-tight text-slate-800">Cemil<span class="text-brand-500">Feels</span></span>
            </div>
            <h1 class="font-display text-3xl sm:text-4xl font-bold tracking-tight text-slate-900 mb-3">
                Ekspresikan perasaanmu hari ini ✨
            </h1>
            <p class="text-slate-500">Pilih cemilan yang paling pas dengan *mood* kamu saat ini.</p>
        </header>

        <!-- Main Card Container -->
        <div class="glass-panel rounded-[2.5rem] p-6 sm:p-10 relative overflow-hidden">
            <!-- Dekorasi bulatan blur di sudut -->
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-brand-100 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

            <!-- Input Nama -->
            <div class="mb-10 relative z-10">
                <label class="font-display font-semibold text-slate-800 mb-3 flex items-center gap-2 text-lg" for="userName">
                    <i data-lucide="user" class="w-5 h-5 text-brand-500"></i> Siapa namamu?
                </label>
                <div class="relative">
                    <input type="text" id="userName" placeholder="Ketik namamu di sini..." 
                        class="w-full pl-5 pr-4 py-4 rounded-2xl border border-slate-200 text-slate-800 placeholder-slate-400 bg-slate-50/50 hover:bg-white focus:bg-white focus:outline-none focus:border-brand-400 focus:ring-4 focus:ring-brand-500/10 transition-all duration-300">
                </div>
            </div>

            <!-- Pilihan Delivery/Ambil -->
            <div class="mb-12 relative z-10">
                <p class="font-display font-semibold text-slate-800 mb-4 flex items-center gap-2 text-lg">
                    <i data-lucide="map-pin" class="w-5 h-5 text-brand-500"></i> Mau diantar atau ambil sendiri?
                </p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Opsi Ambil -->
                    <button class="order-card active rounded-2xl p-5 text-left group flex gap-4 items-start focus:outline-none" id="cardAmbil" onclick="setOrderType('ambil')">
                        <div class="card-icon p-3 rounded-xl bg-slate-100 text-slate-500 transition-colors duration-300 flex-shrink-0">
                            <i data-lucide="store" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <h3 class="font-display font-bold text-slate-800 mb-1 text-lg">Ambil Sendiri</h3>
                            <p class="text-sm text-slate-500 leading-relaxed">Ambil langsung di Outlet Pusat. Cepat & bebas ongkir.</p>
                        </div>
                    </button>
                    
                    <!-- Opsi Delivery -->
                    <button class="order-card rounded-2xl p-5 text-left group flex gap-4 items-start focus:outline-none" id="cardDelivery" onclick="setOrderType('delivery')">
                        <div class="card-icon p-3 rounded-xl bg-slate-100 text-slate-500 transition-colors duration-300 flex-shrink-0">
                            <i data-lucide="bike" class="w-6 h-6"></i>
                        </div>
                        <div class="w-full">
                            <h3 class="font-display font-bold text-slate-800 mb-1 text-lg">Delivery</h3>
                            <p id="deliveryText" class="text-sm text-slate-500 leading-relaxed block">Diantar dalam 15-30 menit ke lokasimu.</p>
                            
                            <!-- Form Alamat (Hidden by default) -->
                            <div id="addressContainer" class="w-full mt-4 w-full">
                                <textarea placeholder="Tulis alamat lengkap pengirimanmu..." 
                                    class="w-full p-3 rounded-xl border border-slate-200 text-slate-800 placeholder-slate-400 bg-slate-50/50 focus:bg-white focus:outline-none focus:border-brand-400 focus:ring-4 focus:ring-brand-500/10 transition-all duration-300 min-h-[100px] resize-none text-sm"></textarea>
                            </div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Pilihan Mood -->
            <div class="relative z-10">
                <p class="font-display font-semibold text-slate-800 mb-5 flex items-center gap-2 text-lg">
                    <i data-lucide="sparkles" class="w-5 h-5 text-brand-500"></i> Lagi merasa apa sekarang?
                </p>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    
                    <!-- Card Marah -->
                    <button class="bg-white border border-slate-100 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-red-500/10 hover:border-red-200 group focus:outline-none focus:ring-4 focus:ring-red-500/20" 
                        onclick="openMoodPopup('Marah', '../img/marah.png', 'text-red-500', 'bg-red-50')">
                        <div class="w-20 h-20 rounded-full bg-slate-50 group-hover:bg-red-50 transition-colors duration-300 flex items-center justify-center">
                            <img src="../img/marah.png" alt="Marah" class="w-40 h-40 object-contain transition-transform duration-300 group-hover:scale-110 drop-shadow-sm">
                        </div>
                        <span class="font-display font-bold text-slate-700 tracking-wide text-sm uppercase">Marah</span>
                    </button>

                    <!-- Card Sedih -->
                    <button class="bg-white border border-slate-100 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-blue-500/10 hover:border-blue-200 group focus:outline-none focus:ring-4 focus:ring-blue-500/20" 
                        onclick="openMoodPopup('Sedih', '../img/sad (2).png', 'text-blue-500', 'bg-blue-50')">
                        <div class="w-20 h-20 rounded-full bg-slate-50 group-hover:bg-blue-50 transition-colors duration-300 flex items-center justify-center">
                            <img src="../img/sad (2).png" alt="Sedih" class="w-40 h-40 object-contain transition-transform duration-300 group-hover:scale-110 drop-shadow-sm">
                        </div>
                        <span class="font-display font-bold text-slate-700 tracking-wide text-sm uppercase">Sedih</span>
                    </button>

                    <!-- Card Bosan -->
                    <button class="bg-white border border-slate-100 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-slate-500/10 hover:border-slate-200 group focus:outline-none focus:ring-4 focus:ring-slate-500/20" 
                        onclick="openMoodPopup('Bosan', '../img/boring.png', 'text-black-600', 'bg-black-100')">
                        <div class="w-20 h-20 rounded-full bg-slate-50 group-hover:bg-slate-100 transition-colors duration-300 flex items-center justify-center">
                            <img src="../img/boring.png" alt="Bosan" class="w-40 h-40 object-contain transition-transform duration-300 group-hover:scale-110 drop-shadow-sm">
                        </div>
                        <span class="font-display font-bold text-slate-700 tracking-wide text-sm uppercase">Bosan</span>
                    </button>

                    <!-- Card Senang -->
                    <button class="bg-white border border-slate-100 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-brand-500/10 hover:border-brand-200 group focus:outline-none focus:ring-4 focus:ring-brand-500/20" 
                        onclick="openMoodPopup('Senang', '../img/happy (2).png', 'text-brand-500', 'bg-brand-50')">
                        <div class="w-20 h-20 rounded-full bg-slate-50 group-hover:bg-brand-50 transition-colors duration-300 flex items-center justify-center">
                            <img src="../img/happy (2).png" alt="Senang" class="w-40 h-40 object-contain transition-transform duration-300 group-hover:scale-110 drop-shadow-sm">
                        </div>
                        <span class="font-display font-bold text-slate-700 tracking-wide text-sm uppercase">Senang</span>
                    </button>

                </div>
            </div>
        </div>
    </main>

    <!-- MODAL POP-UP NOTIFICATION -->
    <div class="modal-overlay fixed inset-0 w-full h-full z-[100] flex justify-center items-center p-4" id="moodModal">
        <div class="modal-content bg-white p-8 sm:p-10 rounded-[2rem] text-center max-w-[400px] w-full shadow-2xl flex flex-col items-center gap-6 border border-slate-100 relative">
            
            <!-- Tombol Close di pojok -->
            <button onclick="closeMoodPopup()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-2 rounded-full transition-colors focus:outline-none">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <!-- Dynamic Icon Container -->
            <div id="modalIconContainer" class="p-6 rounded-full w-32 h-32 flex items-center justify-center transition-colors duration-300">
                <!-- Kita gunakan <img> di sini, bukan <i> -->
                <img id="modalIcon" src="" alt="Mood Icon" class="w-20 h-20 object-contain drop-shadow-md transition-transform hover:scale-105 duration-300">
            </div>
            
            <div>
                <h3 class="font-display text-2xl font-bold text-slate-900 tracking-tight mb-2">Lagi <span id="modalMoodName" class="text-brand-500">...</span> ya?</h3>
                <p class="text-slate-500 text-sm">Tenang, kami punya rekomendasi cemilan yang cocok banget buat nemenin perasaanmu saat ini.</p>
            </div>
            
            <div class="w-full flex flex-col gap-3 mt-2">
                <button class="w-full bg-brand-500 text-white border-none py-4 px-6 rounded-xl font-bold tracking-wide cursor-pointer flex items-center justify-center gap-2 transition-all duration-300 hover:bg-brand-600 hover:shadow-lg hover:shadow-brand-500/30 focus:ring-4 focus:ring-brand-500/20 active:scale-95" 
                    onclick="alert('Mengalihkan ke halaman rekomendasi menu...')">
                    Lihat Rekomendasi Menu <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
                <button class="bg-transparent border-none text-slate-500 text-sm font-semibold cursor-pointer py-3 transition-colors hover:text-slate-800 rounded-xl focus:outline-none" onclick="closeMoodPopup()">
                    Nanti Saja
                </button>
            </div>
        </div>
    </div>

    <!-- Script Logika Interaksi -->
    <script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();

        function setOrderType(type) {
            const cardAmbil = document.getElementById('cardAmbil');
            const cardDelivery = document.getElementById('cardDelivery');
            const addressContainer = document.getElementById('addressContainer');
            const deliveryText = document.getElementById('deliveryText');

            if (type === 'ambil') {
                cardAmbil.classList.add('active');
                cardDelivery.classList.remove('active');
                
                addressContainer.classList.remove('show');
                deliveryText.style.display = 'block';
            } else if (type === 'delivery') {
                cardDelivery.classList.add('active');
                cardAmbil.classList.remove('active');
                
                addressContainer.classList.add('show');
                deliveryText.style.display = 'none';
            }
        }

        const modal = document.getElementById('moodModal');
        const modalMoodName = document.getElementById('modalMoodName');
        const modalIconContainer = document.getElementById('modalIconContainer');
        const modalIcon = document.getElementById('modalIcon');

        function openMoodPopup(moodName, imageSrc, iconColorClass, bgColorClass) {
            // Update Teks Judul
            modalMoodName.innerText = moodName;
            
            // Hapus class warna sebelumnya dan pasang background baru
            modalIconContainer.className = 'p-6 rounded-full w-32 h-32 flex items-center justify-center transition-colors duration-300 ' + bgColorClass;
            
            // Ganti Aset Gambar sesuai dengan path yang dikirim (misal: '../img/senang.png')
            modalIcon.src = imageSrc;

            // Ganti warna teks judul sesuai mood
            modalMoodName.className = iconColorClass;

            // Tampilkan Modal
            modal.classList.add('show');
        }

        function closeMoodPopup() {
            modal.classList.remove('show');
        }

        // Tutup modal jika klik di luar area konten modal
        modal.addEventListener('click', function(event) {
            if (event.target === modal) {
                closeMoodPopup();
            }
        });
        
        // Tutup modal jika tombol Escape ditekan
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && modal.classList.contains('show')) {
                closeMoodPopup();
            }
        });
    </script>
</body>
</html>
