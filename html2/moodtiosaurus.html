<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CemilFeels - Ekspresikan Perasaanmu</title>
    <!-- Meta Deskripsi untuk SEO -->
    <meta name="description" content="Pilih suasana hatimu dan dapatkan rekomendasi snack terbaik dari CemilFeels.">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="moodtiosaurus.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <!-- Logo utama berada di pojok kiri atas -->
            <div class="logo">
                <img src="../img/CEMILLOGOpnggggggggggggg.png" alt="Cemil Feels Logo" class="logo-img">
            </div>
            
            <!-- Kontainer judul otomatis bergeser ke pojok kanan atas -->
            <div class="title-container">
                <!-- Logo asset tambahan di sebelah kiri judul teks -->
                <img src="../img/CEMILAJA.png" alt="Cemil Aja Icon" class="title-icon">
                <h1>Ekspresikan perasaanmu hari ini ✨</h1>
            </div>
        </header>

        <!-- Input Nama -->
        <div class="input-group">
            <label class="section-title" for="userName">👋 Siapa namamu?</label>
            <input type="text" id="userName" placeholder="Ketik namamu di sini...">
        </div>

        <!-- Pilihan Delivery/Ambil -->
        <div class="input-group">
            <p class="section-title">🛵 Mau diantar / ambil?</p>
            <div class="order-options">
                <div class="order-card active" id="cardAmbil" data-method="pickup">
                    <h3>Ambil Sendiri</h3>
                    <p>Ambil langsung di Outlet CemilFeels Pusat (Gratis ongkir & cepat).</p>
                </div>
                
                <div class="order-card" id="cardDelivery" data-method="delivery">
                    <h3>Delivery</h3>
                    <p id="deliveryText">Estimasi pengiriman 15-30 menit tergantung jarak lokasimu.</p>
                    <div id="addressContainer">
                        <textarea id="userAddress" placeholder="Masukkan alamat lengkap pengirimanmu di sini..."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pilihan Mood -->
        <div class="input-group">
            <p class="section-title">🤔 Lagi merasa apa sekarang?</p>
            <div class="mood-grid">
                
                <div class="mood-card" data-mood-id="1" data-mood-name="Marah" data-mood-img="../img/marah.png">
                    <img src="../img/marah.png" alt="Marah" class="mood-image">
                    <span class="mood-tooltip">MARAH</span>
                </div>

                <div class="mood-card" data-mood-id="2" data-mood-name="Sedih" data-mood-img="../img/sedih.png">
                    <img src="../img/sedih.png" alt="Sedih" class="mood-image">
                    <span class="mood-tooltip">SEDIH</span>
                </div>

                <div class="mood-card" data-mood-id="3" data-mood-name="Bosan" data-mood-img="../img/bosan.png">
                    <img src="../img/bosan.png" alt="Bosan" class="mood-image">
                    <span class="mood-tooltip">BOSAN</span>
                </div>

                <div class="mood-card" data-mood-id="4" data-mood-name="Senang" data-mood-img="../img/senang.png">
                    <img src="../img/senang.png" alt="Senang" class="mood-image">
                    <span class="mood-tooltip">SENANG</span>
                </div>

            </div>
        </div>
    </div>

    <!-- ELEMEN POP-UP NOTIFICATION -->
    <div class="modal-overlay" id="moodModal">
        <div class="modal-content">
            <img src="" alt="Mood Icon" class="modal-mood-image" id="modalIcon">
            <h3 class="modal-title">Lagi <span id="modalMoodName">...</span> ya?</h3>
            
            <button class="btn-rekomendasi" id="btnConfirmMood">
                Lihat Menu Rekomendasi ➔
            </button>
            <button class="btn-cancel-modal" id="btnCancelMood">Batalkan</button>
        </div>
    </div>

    <!-- Script Logika Interaksi -->
    <script src="../js/mood.js"></script>
</body>
</html>
