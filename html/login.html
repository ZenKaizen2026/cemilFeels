<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CemilFeels - The Snack Pharmacy</title>
    <!-- Bootstrap 5 CSS untuk utilitas Navbar dasar -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <!-- Tailwind CSS Play CDN & Safe Integration Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (typeof tailwind !== 'undefined') {
            tailwind.config = {
                corePlugins: {
                    preflight: false,
                }
            }
        }
    </script>
</head>
<body>

    <!-- Navbar Minimalis Tailwind Style -->
    <!-- Navbar Minimalis Tailwind Style -->
    <nav class="navbar-custom sticky top-0 w-full bg-white/85 backdrop-blur-md border-b border-gray-200/50 px-4 py-3.5 z-50">
        <div class="max-w-[720px] mx-auto flex items-center justify-between gap-4">
            
            <div class="w-full flex justify-center items-center gap-3.5 sm:gap-5 mb-0">
                <a href="index.html" class="text-xs sm:text-sm font-bold text-gray-600 hover:text-orange-500 transition-colors text-decoration-none m-3">Home</a>
                <a href="alurkerja.html" class="text-xs sm:text-sm font-bold text-gray-600 hover:text-orange-500 transition-colors text-decoration-none m-3">Alur Kerja</a>
                <a href="About_Us.html" class="text-xs sm:text-sm font-bold text-gray-600 hover:text-orange-500 transition-colors text-decoration-none m-3">About Us</a>
            </div>
        </div>
    </nav>
    
    <!-- Konten Utama: Tailwind Centered Card -->
    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Maskot Aplikasi -->
            <img src="CEMILAJA.jpg" alt="CemilFeels Mascot" class="login-logo">
            
            <h2>Welcome Back</h2>
            <p class="subtitle">Masuk untuk tebus "resep" camilan penawar harimu.</p>
            
            <!-- TOMBOL LOGIN INSTAN (GOOGLE) -->
            <button type="button" class="btn-google-login">
                <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Sign in with Google</span>
            </button>

            <!-- Garis Pembatas (Divider) -->
            <div class="login-divider">
                <span>or continue with email</span>
            </div>

            <!-- Form Input Manual -->
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <!-- Remember Me & Lupa Password -->
                <div class="flex-between">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#forgot-password" class="forgot-link">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-submit-login">Sign in</button>
            </form>
            
            <p class="register-prompt">Belum punya akun? <a href="/html/daftar.html">Daftar sekarang</a></p>
            
        </div>
    </div>

    <!-- Footer Tipis -->
    <footer class="tech-note">
        <p>© 2026 CemilFeels. Secured by JAMstack Infrastructure.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
