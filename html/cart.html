<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CemilFeels - Keranjang Belanja</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS Hubungan -->
    <link rel="stylesheet" href="../css/index.css"> <!-- Mewarisi background & glass-card -->
    <link rel="stylesheet" href="../css/cart.css">  <!-- Khusus untuk kalkulator & ringkasan rincian -->
</head>
<body>

    <div class="main-container glass-card">
        <!-- Header Ringkasan -->
        <div class="text-center mb-4">
            <h2 class="cart-title">Detail Keranjang</h2>
            <p class="cart-subtitle">Tinjau kembali pesanan Anda ✨</p>
        </div>

        <!-- Bagian 1: Informasi Pelanggan & Metode -->
        <div class="summary-box mb-4">
            <h5 class="summary-box-title"><i class="fas fa-user-circle"></i> Info Pengiriman</h5>
            <div class="summary-item">
                <span class="label">Nama:</span>
                <span id="summary-name" class="value">-</span>
            </div>
            <div class="summary-item">
                <span class="label">Metode:</span>
                <span id="summary-delivery" class="value">-</span>
            </div>
            <div id="summary-address-row" class="summary-item hidden">
                <span class="label">Alamat:</span>
                <span id="summary-address" class="value text-break">-</span>
            </div>
            <div class="summary-item">
                <span class="label">Mood Hari Ini:</span>
                <span id="summary-mood" class="value font-weight-bold">-</span>
            </div>
        </div>

        <!-- Bagian 2: Tabel Kalkulator Keranjang -->
        <div class="table-responsive mb-4">
            <table class="cart-table w-100">
                <thead>
                    <tr>
                        <th class="text-start">Item</th>
                        <th class="text-end">Harga</th>
                    </tr>
                </thead>
                <tbody id="cart-items-body">
                    <!-- Baris Item Diisi Secara Dinamis dari LocalStorage -->
                </tbody>
            </table>
        </div>

        <!-- Bagian 3: Rincian Total Belanja -->
        <div class="total-box mb-4">
            <div class="total-row">
                <span class="total-label">Subtotal Menu</span>
                <span id="calc-subtotal" class="total-value">Rp 0</span>
            </div>
            <div class="total-row">
                <span class="total-label">Ongkos Kirim</span>
                <span id="calc-ongkir" class="total-value">Rp 0</span>
            </div>
            <hr class="total-divider">
            <div class="total-row grand-total">
                <span class="total-label-grand">Total Bayar</span>
                <span id="calc-total" class="total-value-grand">Rp 0</span>
            </div>
        </div>

        <!-- Tombol Aksi Akhir -->
        <div class="d-flex flex-column gap-2">
            <button type="button" id="btn-checkout" class="btn-whatsapp w-100">
                <i class="fab fa-whatsapp me-2"></i> Kirim Pesanan ke WA
            </button>
            <button type="button" id="btn-edit-order" class="btn-back-link text-center">
                <i class="fas fa-edit me-1"></i> Ubah Pilihan Menu
            </button>
        </div>
    </div>

    <!-- Script Kalkulator & Integrasi API WhatsApp -->
    <script src="../js/cart.js"></script>
</body>
</html>
