<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CemilFeels - Beranda</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS (Gaya Global & Hero Banner) -->
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>

    <div class="hero-container">
        <!-- Card Beranda dengan Gaya Glassmorphism -->
        <div class="glass-card">
            <h1 class="brand-title">Cemil<span>Feels</span></h1>
            <span class="subtitle">Treat Your Mood Today ✨</span>
            
            <p class="text-muted mb-4">
                Punya hari yang berat atau sedang berbunga-bunga? Ceritakan suasana hatimu hari ini, dan kami akan menyajikan rekomendasi cemilan yang pas untuk menemani perasaanmu!
            </p>

            <!-- Video Player (Simulasi Video Kuliner Estetis) -->
            <div class="video-container">
                <!-- Menggunakan video gratis bertema makanan/suasana rileks sebagai representasi visual -->
                <video autoplay muted loop playsinline>
                    <source src="../video.mp4" type="video/mp4">
                    Browser Anda tidak mendukung tag video.
                </video>
            </div>

            <!-- Tombol CTA Navigasi ke Mood Pemilihan -->
            <div class="cta-wrapper">
                <a href="mood.html" class="btn-cta">
                    Mulai Curhat <i class="fas fa-chevron-right"></i>
                </a>
            </div>
        </div>

        <div class="credit">
            &copy; 2026 CemilFeels. Proyek Kuliah Client-Side.
        </div>
    </div>

    <!-- Bootstrap 5.3 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Inisialisasi JavaScript untuk Reset Sesi Halaman -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Logika penting: Menghapus data transaksi sebelumnya dari localStorage
            // saat pengguna kembali ke halaman utama untuk memastikan alur data yang konsisten.
            const keysToClear = [
                'user_name', 
                'delivery_method', 
                'user_address', 
                'selected_mood', 
                'selected_food_name', 
                'selected_food_price', 
                'has_ulcer', 
                'spicy_level', 
                'selected_drink_name', 
                'selected_drink_price'
            ];
            
            keysToClear.forEach(key => localStorage.removeItem(key));
            console.log("Sesi belanja sebelumnya telah dibersihkan.");
        });
    </script>
</body>
</html>
