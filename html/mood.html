<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CemilFeels - Pilih Mood</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS Hubungan -->
    <link rel="stylesheet" href="../css/index.css"> <!-- Mewarisi background & glass-card -->
    <link rel="stylesheet" href="../css/mood.css">  <!-- Khusus untuk style interaktif form ini -->
</head>
<body>

    <div class="main-container glass-card">
        <!-- Header Kecil -->
        <div class="text-center mb-4">
            <h2 class="form-title">CemilFeels</h2>
            <p class="form-subtitle">Ekspresikan perasaanmu hari ini ✨</p>
        </div>

        <!-- Bagian 1: Input Nama -->
        <div class="form-group mb-4">
            <label class="form-label-custom">👋 Siapa namamu?</label>
            <input type="text" id="nama" class="form-control-custom" placeholder="Ketik nama panggilan..." required>
        </div>

        <!-- Bagian 2: Metode Delivery/Pickup -->
        <div class="form-group mb-4">
            <label class="form-label-custom">Mau diantar / ambil?</label>
            <div class="delivery-options">
                <div class="delivery-option active" id="opt-pickup" data-method="pickup">
                    <i class="fas fa-store"></i> Ambil Sendiri
                </div>
                <div class="delivery-option" id="opt-delivery" data-method="delivery">
                    <i class="fas fa-motorcycle"></i> Delivery
                </div>
            </div>
            
            <div id="info-lokasi" class="info-box-custom mt-3">
                <!-- Teks diisi dinamis oleh JavaScript -->
            </div>
            
            <input type="text" id="alamat" class="form-control-custom hidden mt-2 animate-fade" placeholder="Detail Alamat / Patokan lengkap...">
        </div>

        <!-- Bagian 3: Grid Pemilihan Mood -->
        <div class="form-group mb-4">
            <label class="form-label-custom">🤔 Lagi merasa apa sekarang?</label>
            <div class="mood-grid">
                <div class="mood-card mood-1" data-mood-id="1">
                    <i class="fas fa-fire"></i>
                    <span>Stress / Marah</span>
                </div>
                <div class="mood-card mood-2" data-mood-id="2">
                    <i class="fas fa-cloud-showers-heavy"></i>
                    <span>Sedih / Galau</span>
                </div>
                <div class="mood-card mood-3" data-mood-id="3">
                    <i class="fas fa-meh-rolling-eyes"></i>
                    <span>Gabut / Bosan</span>
                </div>
                <div class="mood-card mood-4" data-mood-id="4">
                    <i class="fas fa-laugh-beam"></i>
                    <span>Happy / Lapar</span>
                </div>
            </div>
        </div>

        <!-- Tombol Lanjut ke Menu Rekomendasi -->
        <button type="button" id="btn-submit-mood" class="btn-primary-custom w-100 mt-2">
            Lihat Menu Rekomendasi <i class="fas fa-arrow-right ms-2"></i>
        </button>
    </div>

    <!-- Script Fungsional -->
    <script src="../js/mood.js"></script>
</body>
</html>
